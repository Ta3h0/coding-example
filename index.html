<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css" />
    <title>Daily Coding Document</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            color: inherit;
            font-size: 16px;
            list-style: none;
            line-height: 1.3;
            box-sizing: border-box;
        }

        body {
            background-color: #f4f4f4;
            font-family: "Pretendard Variable", Pretendard, -apple-system, BlinkMacSystemFont, system-ui, Roboto, "Helvetica Neue", "Segoe UI", "Apple SD Gothic Neo", "Noto Sans KR", "Malgun Gothic", "Apple Color Emoji", "Segoe UI Emoji", "Segoe UI Symbol", sans-serif;
        }

        #app {
            width: 100%;
            max-width: 1240px;
            padding: 0 20px;
            margin: 0 auto;
        }

        .item {
            width: calc(100% / 3 - 20px);
            padding: 20px;
            border-radius: 20px;
            background-color: white;
            box-shadow: 10px 10px 30px rgba(0, 0, 0, .12);
        }

        .days {
            padding: 5px 25px;
            border-radius: 50000px;
            background-color: #0368D2;
            color: white;
            display: inline-block;
        }

        .doc-title {
            font-size: 40px;
            text-align: center;
            margin-top: 40px;
        }

        .item-title {
            font-size: 20px;
            overflow: hidden;
            white-space: normal;
            text-overflow: ellipsis;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            word-break: keep-all;
            margin-top: 12px;
            font-weight: bold;
        }

        .row {
            display: flex;
            justify-content: space-between;
            margin-top: 40px;
        }
    </style>
</head>

<body>
    <div id="app">
        <h1 class="doc-title">Daily Study List</h1>
        <div class="row">
            <div class="item">
                <div class="days">Day 1</div>
                <div class="item-title">안녕하세요. 타이틀을 담당할 겁니다.</div>
            </div>
        </div>
    </div>
</body>

</html>
