<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Day 9 과제</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div id="wrap">
        <h1>나만의 책 추천 카드 앱</h1>
        <div class="input-box">
            <input type="text" placeholder="책 제목을 입력해주세요." id="title">
            <input type="text" placeholder="저자를 입력해주세요." id="writer">
            <input type="text" placeholder="장르를 입력해주세요." id="genre">
            <select name="isRecommend" id="isRecommend">
                <option value="" disabled selected>추천 여부</option>
                <option value="recommend">추천</option>
                <option value="no-recommend">비추천</option>
            </select>
            <button id="addBtn">추가하기</button>
        </div>
        <div class="row" id="book-panel">
            <!-- 카드 들어올 예정 -->
        </div>
    </div>

    <script src="js/common.js"></script>

</body>
</html>
