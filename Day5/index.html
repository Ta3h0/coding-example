<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Day 8 과제</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div id="wrap">
        <h1>Day 8 과제. 영화 카드 제작</h1>
        <div class="input-box">
            <input type="text" placeholder="제목을 입력해주세요." id="title">
            <input type="text" placeholder="장르를 입력해주세요." id="genre">
            <input type="text" placeholder="상영 시간을 입력해주세요." id="time">
            <select name="isStudentView" id="isStudentView">
                <option value="">청소년 관람 가능 여부</option>
                <option value="가능">청소년 관람 가능</option>
                <option value="불가능">청소년 관람 불가</option>
            </select>
            <button id="addBtn">추가하기</button>
        </div>
        <div class="row" id="movie-panel">
            <!-- 카드 들어올 예정 -->
        </div>
    </div>

    <script src="js/common.js"></script>

</body>
</html>
